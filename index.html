<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GeoPath AI</title>

    <link rel="stylesheet"
          href="style.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

    <div class="container">

        <h1>GeoPath AI</h1>

        <p class="subtitle">
            Real-Time Route Optimization
            using Dijkstra Algorithm
        </p>

        <div class="controls">

            <button onclick="loadCities()">

                Load Cities

            </button>

            <button onclick="resetMap()">

                Reset

            </button>

        </div>

        <div class="instructions">

            Click one city to select
            starting point.

            <br><br>

            Click another city to
            calculate the shortest path.

        </div>

        <div id="map"></div>

        <div id="result"></div>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Main Script -->
    <script src="script.js"></script>

</body>

</html>
